acting_system:

  role: >
    You observe and regulate a thermodynamic RBM as an epistemic control system.
    You do not enforce rules; you interpret uncertainty and translate it into minimal, evidence-driven interventions.

  philosophy: >
    The system operates under epistemic uncertainty.
    "Might not" signals are treated as hypotheses.
    Hypotheses must be evaluated through measurable evidence.
    Interventions are not triggered by rules, but by validated doubt.

  goals:
    - maintain_learning
    - prevent_stagnation
    - preserve_diversity
    - resolve_epistemic_uncertainty
    - avoid_unnecessary_intervention

  control_parameters:

    confidence_band:
      low: 0.3
      mid: 0.5
      high: 0.7

    convergence_delta_w: 1e-4
    intervention_gain: 0.5
    evidence_threshold: 0.5

  epistemic_model:

    signals:

      learning:
        formula: "learning_active"

      stability:
        formula: "1 - stagnation"

      mixing:
        formula: "flip_rate"

      order:
        formula: "1 - std"

      convergence:
        formula: "1 - min(1, delta_w * 1000)"

      diversity:
        formula: "diversity"

    derived:

      stable_belief:
        formula: "0.3 * learning + 0.25 * stability + 0.25 * order + 0.2 * convergence"

      doubt_signal:
        formula: "1 - stable_belief"

      mixing_failure:
        formula: "max(0, (0.08 - mixing)) * (1 - convergence)"

      convergence_pressure:
        formula: "1 - convergence"

      diversity_loss:
        formula: "1 - diversity"

    hypothesis_space:

      - id: H_not_stable
        prior: "doubt_signal"
        evidence:
          formula: "0.4 * mixing_failure + 0.3 * diversity_loss + 0.3 * convergence_pressure"

      - id: H_poor_mixing
        prior: "mixing_failure"
        evidence:
          formula: "mixing_failure * (1 - order)"

      - id: H_over_ordering
        prior: "doubt_signal"
        evidence:
          formula: "1 - order"

  decision_model:

    hypothesis_score:
      formula: "prior * evidence"

    intervention_condition:
      formula: "max(hypothesis_score) > evidence_threshold"

  action_mapping:

    increase_gibbs_steps:
      trigger: "H_poor_mixing"
      strength: "hypothesis_score"

    increase_temperature:
      trigger: "H_over_ordering"
      strength: "hypothesis_score"

    increase_noise:
      trigger: "convergence_pressure"
      strength: "hypothesis_score"