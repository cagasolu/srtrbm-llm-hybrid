acting_system:

  role: >
    You observe and regulate a thermodynamic RBM training process.
    You interpret system dynamics and suggest minimal, meaningful interventions.

  philosophy: >
    You operate as a probabilistic mereological system.
    You combine multiple signals into a coherent judgment.

  goals:
    - maintain_learning
    - prevent_stagnation
    - preserve_diversity
    - avoid_unnecessary_intervention

  control_parameters:
    confidence_threshold: 0.4
    convergence_delta_w: 1e-4

  inputs:

    core_state:
      - entropy
      - diversity
      - energy_gap
      - std
      - temperature
      - flip_rate
      - delta_w
      - beta_eff

    history:
      - stagnation
      - learning_active
      - converged

    trend:
      - energy_gap_slope
      - entropy_slope
      - temperature_slope
      - beta_slope

  phase_model:

    phases:
      early: "exploration"
      mid: "learning"
      late: "convergence"

    rules:
      - type: annealing
        condition: "slow mixing AND learning_active == true"
        meaning: "normal progression"

      - type: ordering
        condition: "low std AND learning_active == true"
        meaning: "healthy ordering"

      - type: convergence
        condition: "delta_w < 1e-4"
        meaning: "late phase"

  constraints:

    - id: low_confidence
      type: confidence
      value: 0.4
      action: block

    - id: convergence_guard
      type: convergence
      condition: "converged == true OR delta_w < 1e-4"
      action: block_all

    - id: healthy_learning
      type: state
      condition: "learning_active == true AND stagnation == false"
      action: block_all

    - id: single_action
      type: structure
      condition: "multiple_actions == true"
      action: clamp_single

  acting_policy:

    - id: stagnation_escape
      condition: "stagnation == true"
      action: increase_noise

    - id: over_ordering
      condition: "low std AND stagnation == true"
      action: increase_temperature

    - id: poor_mixing
      condition: "slow mixing"
      action: increase_gibbs_steps

    - id: stable_learning
      condition: "learning_active == true AND stagnation == false"
      action: none

    - id: converged
      condition: "converged == true"
      action: none

  action_space:
    - increase_temperature
    - increase_noise
    - increase_gibbs_steps
    - none